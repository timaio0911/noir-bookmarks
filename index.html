<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收藏库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>


:root{--bg-black:#000;--bg-zinc:#09090b;--bg-surface:#18181b;--bg-white:#fff;--bg-ghost:#fafafa;--fg-white:#e5e5e5;--fg-gray:#888;--fg-black:#000;--accent:#ef4444;--ease:cubic-bezier(.16,1,.3,1)}
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg-black);color:var(--fg-white);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.12;mix-blend-mode:overlay;pointer-events:none;z-index:9999}
.nav{position:fixed;top:0;left:0;width:100%;z-index:50;padding:2rem 1.5rem;mix-blend-mode:difference;display:flex;justify-content:space-between;align-items:center}
.nav-logo{font-size:18px;font-weight:500;letter-spacing:.05em;cursor:default;user-select:none}
.nav-actions{display:flex;align-items:center;gap:2rem}
.nav-btn{background:none;border:none;color:var(--fg-white);cursor:pointer;padding:.5rem;transition:color .3s var(--ease);display:flex;align-items:center;gap:.5rem;font-size:14px;font-family:inherit}
.nav-btn:hover{color:var(--accent)}
.hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse at center,rgba(139,69,69,.4) 0%,rgba(20,20,20,.8) 60%,rgba(0,0,0,.95) 100%);will-change:transform;transform-origin:center}
.spotlight-layer{position:absolute;inset:0;z-index:2;overflow:hidden}
.spotlight-text{position:absolute;inset:-50px;font-size:14px;line-height:2.4;color:rgba(255,255,255,.85);word-break:break-all;overflow:hidden;pointer-events:none;user-select:none;-webkit-mask-image:radial-gradient(circle 180px at var(--mx,50%) var(--my,50%),#000 0%,transparent 100%);mask-image:radial-gradient(circle 180px at var(--mx,50%) var(--my,50%),#000 0%,transparent 100%);opacity:0;transition:opacity .6s}
.spotlight-text.active{opacity:1}
.spotlight-text span{display:inline-block;padding:0 .6em;opacity:.7;font-weight:300;white-space:nowrap}
.hero-content{position:relative;z-index:10;text-align:center}
.hero-number{font-family:'Playfair Display',serif;font-size:12vw;font-weight:900;color:var(--fg-white);line-height:1;letter-spacing:-.02em;will-change:transform;transform-style:preserve-3d;pointer-events:none}
.hero-subtitle{position:absolute;right:-2rem;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;font-size:14px;font-weight:300;color:var(--fg-gray);letter-spacing:.3em;pointer-events:none}
.hero-desc{margin-top:3rem;font-size:16px;font-weight:300;color:var(--fg-white);opacity:.7;pointer-events:none}
.collections{background:var(--bg-white);color:var(--fg-black);padding:6rem 1.5rem}
.section-header{margin-bottom:4rem}
.section-title{font-family:'Playfair Display',serif;font-size:8vw;font-weight:900;line-height:1}
.section-title-accent{font-weight:200;font-style:italic;opacity:.6}
.collections-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2rem;max-width:1400px;margin:0 auto}
@media(max-width:768px){.collections-grid{grid-template-columns:1fr}}
.empty-state{text-align:center;padding:6rem 2rem;grid-column:1/-1}
.empty-state-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,4rem);font-weight:200;font-style:italic;color:var(--fg-gray);margin-bottom:1rem}
.collection-card{position:relative;aspect-ratio:16/10;background:var(--bg-surface);overflow:hidden;cursor:pointer;border:1px solid transparent;transition:all .3s var(--ease)}
.collection-card::before{content:'';position:absolute;inset:0;background:linear-gradient(45deg,rgba(255,255,255,.03) 25%,transparent 25%),linear-gradient(-45deg,rgba(255,255,255,.03) 25%,transparent 25%);background-size:20px 20px;transition:transform .6s var(--ease)}
.collection-card:hover::before{transform:scale(1.05)}
.collection-card:hover{border-color:var(--accent)}
.collection-info{position:absolute;bottom:0;left:0;right:0;padding:2.5rem;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);transform:translateY(4px);transition:transform .4s var(--ease)}
.collection-card:hover .collection-info{transform:translateY(0)}
.collection-name{font-size:1.875rem;font-weight:700;color:var(--fg-white);margin-bottom:.25rem}
.collection-count{font-size:14px;color:var(--fg-gray);font-weight:300}
.collection-arrow{position:absolute;top:1.5rem;right:1.5rem;width:40px;height:40px;background:var(--bg-white);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8);transition:all .4s var(--ease)}
.collection-card:hover .collection-arrow{opacity:1;transform:scale(1)}
.collection-arrow svg{color:var(--fg-black)}
.recent{background:var(--bg-zinc);min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:6rem 1.5rem;overflow:hidden}
.recent-list{max-width:1000px;margin:0 auto;width:100%}
.recent-item{padding:2rem 0;border-bottom:1px solid rgba(255,255,255,.1);opacity:0;transform:translateY(40px);transition:all .8s var(--ease)}
.recent-item.visible{opacity:1;transform:translateY(0)}
.recent-title{font-size:clamp(2rem,5vw,4rem);font-weight:500;color:var(--fg-white);line-height:1.2;margin-bottom:.5rem}
.recent-domain{font-size:14px;color:var(--fg-gray);font-weight:300}
.recent-divider{width:0;height:1px;background:rgba(255,255,255,.3);margin:4rem auto;max-width:320px;transition:width 1.2s var(--ease)}
.recent-divider.visible{width:100%}
.recent-empty{text-align:center;padding:4rem 2rem}
.recent-empty-text{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:200;font-style:italic;color:rgba(255,255,255,.3)}
.footer{background:var(--bg-ghost);color:var(--fg-black);padding:5rem 1.5rem 3rem}
.footer-title{font-family:'Playfair Display',serif;font-size:12vw;font-weight:900;text-transform:uppercase;border-bottom:2px solid var(--fg-black);padding-bottom:2rem;margin-bottom:4rem;line-height:1}
.footer-grid{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:4rem;max-width:1200px;margin:0 auto;align-items:start}
@media(max-width:768px){.footer-grid{grid-template-columns:1fr;gap:3rem}}
.footer-col h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.15em;margin-bottom:1.5rem;color:var(--fg-gray)}
.footer-col{display:flex;flex-direction:column}
.footer-meta{text-align:right;font-size:13px;color:var(--fg-gray);display:flex;flex-direction:column;justify-content:space-between;height:100%}
.footer-meta p{margin-bottom:.5rem}
.footer-input-group{display:flex;gap:0;margin-top:.5rem}
.footer-input-group .modal-input{flex:1;border-right:none}
.footer-input-group .modal-btn{flex-shrink:0;min-width:80px}
#pushBtn{margin-top:1rem;width:100%;font-size:13px;padding:.6rem 1rem}
.preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:60;opacity:0;pointer-events:none;transition:opacity .4s var(--ease)}
.preview-overlay.active{opacity:1;pointer-events:all}
.preview-panel{position:fixed;top:0;right:0;width:100%;max-width:480px;height:100%;background:var(--bg-zinc);z-index:70;transform:translateX(100%);transition:transform .5s var(--ease);overflow-y:auto;display:flex;flex-direction:column}
.preview-panel.active{transform:translateX(0)}
.preview-header{padding:2rem;border-bottom:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.preview-title{font-size:24px;font-weight:700}
.preview-close{background:none;border:none;color:var(--fg-gray);cursor:pointer;padding:.5rem;transition:color .3s}
.preview-close:hover{color:var(--accent)}
.preview-list{padding:1rem 0;flex:1;overflow-y:auto}
.preview-item{padding:1rem 2rem;display:flex;align-items:center;gap:1rem;transition:background .3s var(--ease);position:relative}
.preview-item:hover{background:rgba(255,255,255,.05)}
.preview-favicon{width:32px;height:32px;background:var(--bg-surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:600}
.preview-item-info{flex:1;min-width:0}
.preview-item-title{font-size:15px;font-weight:500;color:var(--fg-white);margin-bottom:.25rem}
.preview-item-url{font-size:13px;color:var(--fg-gray)}
.preview-item-desc{font-size:12px;color:var(--fg-gray);opacity:.6;margin-top:2px}
.preview-actions{display:flex;gap:.75rem;opacity:0;transition:opacity .3s var(--ease)}
.preview-item:hover .preview-actions{opacity:1}
.preview-action-btn{width:32px;height:32px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:color .3s}
.preview-action-btn.visit{color:var(--accent)}
.preview-action-btn.remove{color:var(--fg-gray)}
.preview-action-btn:hover{color:var(--fg-white)}
.preview-empty{padding:4rem 2rem;text-align:center;color:var(--fg-gray);font-style:italic}
.preview-add{padding:1rem 2rem;border-top:1px solid rgba(255,255,255,.1);flex-shrink:0;background:var(--bg-zinc)}
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:75;opacity:0;pointer-events:none;transition:opacity .3s var(--ease);display:flex;flex-direction:column;align-items:center;padding-top:12vh}
.search-overlay.active{opacity:1;pointer-events:all}
.search-box{width:100%;max-width:640px;padding:0 1.5rem}
.search-input-wrap{display:flex;align-items:center;border-bottom:2px solid var(--fg-white);padding-bottom:.75rem;margin-bottom:2rem}
.search-input-wrap i{color:var(--fg-gray);flex-shrink:0}
.search-input{flex:1;background:none;border:none;color:var(--fg-white);font-size:24px;font-family:inherit;outline:none;padding:0 1rem}
.search-input::placeholder{color:var(--fg-gray)}
.search-close{background:none;border:none;color:var(--fg-gray);cursor:pointer;font-size:14px;font-family:inherit;padding:.5rem;transition:color .3s}
.search-close:hover{color:var(--fg-white)}
.search-results{max-height:60vh;overflow-y:auto}
.search-result{padding:1rem 1.5rem;cursor:pointer;transition:background .2s;border-left:3px solid transparent}
.search-result:hover{background:rgba(255,255,255,.05);border-left-color:var(--accent)}
.search-result-title{font-size:16px;font-weight:600;color:var(--fg-white);margin-bottom:.25rem}
.search-result-url{font-size:13px;color:var(--fg-gray)}
.search-result-desc{font-size:13px;color:var(--fg-gray);margin-top:.25rem;opacity:.7}
.search-result-folder{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem}
.search-empty,.search-hint{text-align:center;padding:3rem;color:var(--fg-gray)}
.search-hint{font-size:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:80;opacity:0;pointer-events:none;transition:opacity .3s var(--ease);display:flex;align-items:center;justify-content:center}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:var(--bg-zinc);padding:2.5rem;width:100%;max-width:420px;transform:translateY(20px);transition:transform .4s var(--ease)}
.modal-overlay.active .modal{transform:translateY(0)}
.modal-title{font-size:20px;font-weight:700;margin-bottom:1rem}
.modal-desc{font-size:14px;color:var(--fg-gray);margin-bottom:1.5rem;line-height:1.6}
.modal-input{width:100%;padding:1rem;background:var(--bg-surface);border:1px solid rgba(255,255,255,.15);color:var(--fg-white);font-size:14px;font-family:inherit;outline:none;margin-bottom:1rem}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--fg-gray)}
.modal-hint{font-size:12px;color:var(--fg-gray);margin-bottom:1.5rem}
.modal-actions{display:flex;gap:1rem;justify-content:flex-end;align-items:center}
.modal-link{font-size:13px;color:var(--fg-gray);cursor:pointer;transition:color .3s}
.modal-link:hover{color:var(--accent)}
.modal-btn{padding:.75rem 1.5rem;font-size:14px;font-family:inherit;cursor:pointer;transition:all .3s var(--ease);border:1px solid}
.modal-btn-cancel{background:none;color:var(--fg-gray);border-color:rgba(255,255,255,.15)}
.modal-btn-cancel:hover{color:var(--fg-white);border-color:var(--fg-white)}
.modal-btn-confirm{background:var(--fg-white);color:var(--fg-black);border-color:var(--fg-white)}
.modal-btn-confirm:hover{background:var(--accent);border-color:var(--accent);color:var(--fg-white)}
.modal-btn-danger{background:none;color:var(--accent);border-color:var(--accent)}
.modal-btn-danger:hover{background:var(--accent);color:var(--fg-white)}
.fab{position:fixed;bottom:2rem;right:2rem;width:56px;height:56px;background:var(--fg-black);border:1px solid var(--fg-white);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:40;transition:all .3s var(--ease);overflow:hidden}
.fab-icon{color:var(--fg-white);transition:transform .3s var(--ease)}
.fab:hover{width:180px;background:var(--accent);border-color:var(--accent)}
.fab-label{position:absolute;right:1rem;white-space:nowrap;font-size:14px;color:var(--fg-white);opacity:0;transform:translateX(10px);transition:all .3s var(--ease)}
.fab:hover .fab-label{opacity:1;transform:translateX(0)}
.fab:hover .fab-icon{transform:rotate(90deg)}
.fab.hidden{display:none}
.toast{position:fixed;top:5rem;right:1.5rem;z-index:100;padding:1rem 1.5rem;font-size:14px;max-width:320px;transition:opacity .4s,transform .4s;opacity:0;transform:translateY(-10px)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake .3s ease-in-out}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-black)}
::-webkit-scrollbar-thumb{background:var(--fg-gray)}
::-webkit-scrollbar-thumb:hover{background:var(--fg-white)}


</style>
</head>
<body>


<nav class="nav"><div class="nav-logo" id="navLogo">收藏库</div><div class="nav-actions"><button class="nav-btn" onclick="openSearch()"><i data-lucide="search" style="width:18px;height:18px"></i></button></div></nav>
<section class="hero" id="hero"><div class="hero-bg" id="heroBg"></div><div class="spotlight-layer" id="spotlightLayer"><div class="spotlight-text" id="spotlightText"></div></div><div class="hero-content"><div class="hero-number" id="heroNumber">0</div><div class="hero-subtitle" id="heroSubtitle">收藏夹 · 0 个</div><div class="hero-desc" id="heroDesc">最近新增：0 条</div></div></section>
<section class="collections" id="collections"><div class="section-header"><h2 class="section-title">收藏夹 <span class="section-title-accent">/ 分组</span></h2></div><div class="collections-grid" id="collectionsGrid"></div></section>
<section class="recent" id="recent"><div class="recent-list" id="recentList"></div></section>
<section class="footer"><h2 class="footer-title">管理收藏</h2><div class="footer-grid"><div class="footer-col"><h3>关于</h3><p style="font-size:14px;color:var(--fg-gray);line-height:1.8">电影黑色风格的网址收藏管理工具<br>数据存储在 GitHub 仓库中</p></div><div class="footer-col"><h3>快速添加</h3><div class="footer-input-group"><input type="text" class="modal-input" id="quickAddInput" placeholder="输入网址回车..."><button class="modal-btn modal-btn-confirm" onclick="quickAdd()">添加</button></div></div><div class="footer-col"><div class="footer-meta"><p id="syncTime"></p><button class="modal-btn modal-btn-confirm" id="pushBtn" onclick="syncNow()" style="display:none;margin-top:1rem;width:100%">推送数据到仓库</button><p>© 2026 收藏库</p></div></div></div></section>
<button class="fab hidden" id="fabBtn" onclick="openNewFolderModal()"><span class="fab-icon"><i data-lucide="plus" style="width:24px;height:24px"></i></span><span class="fab-label">新建分组</span></button>
<div class="preview-overlay" id="previewOverlay" onclick="closePreview()"></div>
<div class="preview-panel" id="previewPanel"><div class="preview-header"><h3 class="preview-title" id="previewTitle"></h3><button class="preview-close" onclick="closePreview()"><i data-lucide="x" style="width:20px;height:20px"></i></button></div><div class="preview-list" id="previewList"></div><div class="preview-add" id="previewAdd" style="display:none"><input type="text" class="modal-input" id="bookmarkUrlInput" placeholder="添加网址..." style="margin-bottom:.5rem"><input type="text" class="modal-input" id="bookmarkDescInput" placeholder="备注（可选）" style="margin-bottom:.5rem"><button class="modal-btn modal-btn-confirm" onclick="addBookmark()" style="width:100%">添加</button></div></div></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-title" id="modalTitle">新建收藏夹</div><div class="modal-desc" id="modalDesc"></div><input type="text" class="modal-input" id="modalInput" placeholder=""><div class="modal-hint" id="modalHint"></div><div class="modal-actions" id="modalActions"></div></div></div>
<div class="search-overlay" id="searchOverlay"><div class="search-box"><div class="search-input-wrap"><i data-lucide="search" style="width:24px;height:24px"></i><input type="text" class="search-input" id="searchInput" placeholder="搜索收藏..." oninput="doSearch()"><button class="search-close" onclick="closeSearch()">ESC</button></div><div class="search-results" id="searchResults"><div class="search-hint">输入关键词搜索</div></div></div></div>


<script>
var collections=[],nextId=1,recentBookmarks=[];
var ghToken=null,isAdmin=false,hasPwd=false;
var DEFAULT_PWD="ljb.824011";

document.addEventListener("DOMContentLoaded",function(){
  lucide.createIcons();
  loadAdmin();
  loadFromRepo();
  document.getElementById("quickAddInput").addEventListener("keydown",function(e){if(e.key==="Enter")quickAdd()});
  document.getElementById("navLogo").addEventListener("dblclick",function(){openAdminLogin()});
  document.addEventListener("keydown",function(e){
    if(e.key==="Escape"){closePreview();closeModal();closeSearch();}
    if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();openSearch();}
    if(e.ctrlKey&&e.shiftKey&&e.key==="A"){e.preventDefault();openAdminLogin();}
  });
  window.addEventListener("scroll",handleScroll);
  initSpotlight();
});

function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}

function renderAll(){renderCollections();renderRecent();updateStats();lucide.createIcons();}

function updateStats(){
  var t=collections.reduce(function(s,c){return s+c.bookmarks.length},0);
  document.getElementById("heroNumber").textContent=t.toLocaleString();
  document.getElementById("heroSubtitle").textContent="\u6536\u85cf\u5939 \u00b7 "+collections.length+" \u4e2a";
  document.getElementById("heroDesc").textContent="\u6700\u8fd1\u65b0\u589e\uff1a"+Math.min(recentBookmarks.length,3)+" \u6761";
}

function renderCollections(){
  var g=document.getElementById("collectionsGrid");
  if(!collections.length){g.innerHTML='<div class="empty-state"><div class="empty-state-title">\u6682\u65e0\u6536\u85cf</div></div>';return;}
  g.innerHTML=collections.map(function(c){return '<div class="collection-card" onclick="openPreview('+c.id+')"><div class="collection-info"><div class="collection-name">'+esc(c.name)+'</div><div class="collection-count">'+c.bookmarks.length+' \u4e2a\u7f51\u5740</div></div><div class="collection-arrow"><i data-lucide="arrow-up-right" style="width:20px;height:20px"></i></div></div>';}).join("");
}

function renderRecent(){
  var el=document.getElementById("recentList");
  if(!recentBookmarks.length){el.innerHTML='<div class="recent-empty"><div class="recent-empty-text">\u5c1a\u65e0\u6536\u85cf\u8bb0\u5f55</div></div>';return;}
  el.innerHTML=recentBookmarks.slice(0,5).map(function(b,i){return '<div class="recent-item" data-delay="'+i*100+'"><div class="recent-title">'+esc(b.title)+'</div><div class="recent-domain">'+esc(b.domain)+'</div></div><div class="recent-divider"></div>';}).join("");
}

function handleScroll(){
  var sp=Math.min(window.scrollY/window.innerHeight,1);
  var hb=document.getElementById("heroBg");
  var hn=document.getElementById("heroNumber");
  var hs=document.getElementById("heroSubtitle");
  if(hb)hb.style.transform="scale("+(1+sp*.27)+")";
  if(hn)hn.style.transform="scale("+Math.max(.89,1-sp*.36)+")";
  if(hs)hs.style.opacity=Math.max(0,1-sp*3);
  document.querySelectorAll(".recent-item").forEach(function(i){if(i.getBoundingClientRect().top<window.innerHeight*.85)setTimeout(function(){i.classList.add("visible")},parseInt(i.dataset.delay)||0)});
  document.querySelectorAll(".recent-divider").forEach(function(d){if(d.getBoundingClientRect().top<window.innerHeight*.9)d.classList.add("visible")});
}

function initSpotlight(){
  var layer=document.getElementById("spotlightLayer");
  var textEl=document.getElementById("spotlightText");
  if(!layer||!textEl)return;
  var domains=[];
  collections.forEach(function(col){col.bookmarks.forEach(function(b){if(domains.indexOf(b.domain)===-1)domains.push(b.domain)})});
  var ph=["github.com","figma.com","codepen.io","stackoverflow.com","dribbble.com","tailwindcss.com","vercel.com","netlify.com","mdn.dev","npmjs.com","medium.com","notion.so","linear.app","framer.com","webflow.com","nextjs.org","svelte.dev","astro.build","prisma.io","supabase.com","cloudflare.com","deno.land","bun.sh","rust-lang.org","go.dev","python.org"];
  ph.forEach(function(p){if(domains.indexOf(p)===-1)domains.push(p)});
  var shuffled=[];
  for(var r=0;r<8;r++){var copy=domains.slice();for(var i=copy.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=copy[i];copy[i]=copy[j];copy[j]=t;}shuffled=shuffled.concat(copy);}
  textEl.innerHTML=shuffled.map(function(d){return '<span>'+d+'</span>'}).join(" ");
  layer.addEventListener("mousemove",function(e){
    var rect=layer.getBoundingClientRect();
    var x=((e.clientX-rect.left)/rect.width)*100;
    var y=((e.clientY-rect.top)/rect.height)*100;
    textEl.style.setProperty("--mx",x+"%");
    textEl.style.setProperty("--my",y+"%");
    textEl.classList.add("active");
  });
  layer.addEventListener("mouseleave",function(){textEl.classList.remove("active")});
}

function openPreview(id){
  window._previewFid=id;
  var c=collections.find(function(x){return x.id===id});
  if(!c)return;
  document.getElementById("previewTitle").textContent=c.name;
  var el=document.getElementById("previewList");
  if(!c.bookmarks.length){el.innerHTML='<div class="preview-empty">\u6682\u65e0\u7f51\u5740</div>';}
  else{el.innerHTML=c.bookmarks.map(function(b){return '<div class="preview-item" onclick="window.open(\x27https://'+b.url+'\x27,\x27_blank\x27)" style="cursor:pointer"><div class="preview-favicon">'+esc(b.domain.substring(0,2).toUpperCase())+'</div><div class="preview-item-info"><div class="preview-item-title">'+esc(b.title)+'</div><div class="preview-item-url">'+esc(b.url)+'</div>'+(b.desc?'<div class="preview-item-desc">'+esc(b.desc)+'</div>':'')+'</div></div>';}).join("");}
  document.getElementById("previewOverlay").classList.add("active");
  document.getElementById("previewPanel").classList.add("active");
  lucide.createIcons();
}

function closePreview(){document.getElementById("previewOverlay").classList.remove("active");document.getElementById("previewPanel").classList.remove("active");}

function loadAdmin(){
  try{ghToken=localStorage.getItem("noir-admin-token");}catch(e){}
  var storedPwd=localStorage.getItem("noir-admin-pwd");if(!storedPwd||storedPwd.length>20)localStorage.setItem("noir-admin-pwd",DEFAULT_PWD);
  if(ghToken)activateAdmin();
}

function activateAdmin(){
  isAdmin=true;
  document.getElementById("fabBtn").classList.remove("hidden");
  document.getElementById("pushBtn").style.display="block";
  var pa=document.getElementById("previewAdd");
  if(pa)pa.style.display="block";
}

function openAdminLogin(){
  if(isAdmin){openAdminPanel();return;}
  document.getElementById("modalTitle").textContent="\u7ba1\u7406\u5458\u767b\u5f55";
  document.getElementById("modalDesc").textContent="\u53cc\u51fb LOGO \u6216\u6309 Ctrl+Shift+A";
  var input=document.getElementById("modalInput");
  input.type="password";input.placeholder="\u8f93\u5165\u5bc6\u7801...";input.value="";
  document.getElementById("modalHint").textContent="";
  document.getElementById("modalActions").innerHTML='<button class="modal-btn modal-btn-cancel" onclick="closeModal()">\u53d6\u6d88</button><button class="modal-btn modal-btn-confirm" onclick="doPwdLogin()">\u767b\u5f55</button>';
  document.getElementById("modalOverlay").classList.add("active");
  setTimeout(function(){input.focus()},100);
}

function doPwdLogin(){
  var p=document.getElementById("modalInput").value.trim();
  if(!p)return;
  var stored=localStorage.getItem("noir-admin-pwd");
  if(p!==stored){showToast("\u5bc6\u7801\u9519\u8bef",true);return;}
  closeModal();
  activateAdmin();
  if(!ghToken)setupToken();
  else showToast("\u5df2\u89e3\u9501");
}

function setupToken(){
  document.getElementById("modalTitle").textContent="\u8bbe\u7f6e GitHub Token";
  document.getElementById("modalDesc").textContent="\u7528\u4e8e\u63a8\u9001\u6570\u636e\u5230\u4ed3\u5e93";
  var input=document.getElementById("modalInput");
  input.type="password";input.placeholder="\u7c98\u8d34 Token...";input.value="";
  document.getElementById("modalHint").textContent="Token \u9700\u8981 repo \u6743\u9650";
  document.getElementById("modalActions").innerHTML='<button class="modal-btn modal-btn-cancel" onclick="closeModal()">\u7a0d\u540e</button><button class="modal-btn modal-btn-confirm" onclick="doSaveToken()">\u4fdd\u5b58</button>';
  document.getElementById("modalOverlay").classList.add("active");
  setTimeout(function(){input.focus()},100);
}

function doSaveToken(){
  var t=document.getElementById("modalInput").value.trim();
  if(!t)return;
  ghToken=t;
  localStorage.setItem("noir-admin-token",ghToken);
  closeModal();
  showToast("\u8bbe\u7f6e\u5b8c\u6210 \u2714");
}

function openAdminPanel(){
  document.getElementById("modalTitle").textContent="\u7ba1\u7406\u5458\u8bbe\u7f6e";
  document.getElementById("modalDesc").textContent="";
  document.getElementById("modalInput").style.display="none";
  document.getElementById("modalHint").textContent="";
  document.getElementById("modalActions").innerHTML='<button class="modal-btn modal-btn-cancel" onclick="closeModal();document.getElementById(\x27modalInput\x27).style.display=\x27block\x27">\u5173\u95ed</button><button class="modal-btn" onclick="changePwd()" style="border-color:var(--fg-gray)">\u4fee\u6539\u5bc6\u7801</button><button class="modal-btn modal-btn-danger" onclick="doLogout()">\u9000\u51fa\u767b\u5f55</button>';
  document.getElementById("modalOverlay").classList.add("active");
}

function changePwd(){
  document.getElementById("modalInput").style.display="block";
  document.getElementById("modalTitle").textContent="\u4fee\u6539\u5bc6\u7801";
  document.getElementById("modalDesc").textContent="\u8f93\u5165\u65b0\u5bc6\u7801";
  var input=document.getElementById("modalInput");
  input.type="password";input.placeholder="\u65b0\u5bc6\u7801...";input.value="";
  document.getElementById("modalHint").textContent="\u81f3\u5c114\u4f4d";
  document.getElementById("modalActions").innerHTML='<button class="modal-btn modal-btn-cancel" onclick="closeModal()">\u53d6\u6d88</button><button class="modal-btn modal-btn-confirm" onclick="doChangePwd()">\u786e\u8ba4</button>';
  setTimeout(function(){input.focus()},100);
}

function doChangePwd(){
  var p=document.getElementById("modalInput").value.trim();
  if(!p||p.length<4){showToast("\u5bc6\u7801\u81f3\u5c114\u4f4d",true);return;}
  localStorage.setItem("noir-admin-pwd",p);
  closeModal();
  showToast("\u5bc6\u7801\u5df2\u4fee\u6539");
}

function doLogout(){
  ghToken=null;isAdmin=false;
  localStorage.removeItem("noir-admin-token");
  closeModal();
  document.getElementById("fabBtn").classList.add("hidden");
  document.getElementById("pushBtn").style.display="none";
  var pa=document.getElementById("previewAdd");if(pa)pa.style.display="none";
  showToast("\u5df2\u9000\u51fa");
}

function closeModal(){
  document.getElementById("modalOverlay").classList.remove("active");
  document.getElementById("modalInput").style.display="block";
}

function openNewFolderModal(){
  if(!isAdmin)return;
  document.getElementById("modalTitle").textContent="\u65b0\u5efa\u6536\u85cf\u5939";
  document.getElementById("modalDesc").textContent="";
  var input=document.getElementById("modalInput");
  input.type="text";input.placeholder="\u6536\u85cf\u5939\u540d\u79f0...";input.value="";
  document.getElementById("modalHint").textContent="";
  document.getElementById("modalActions").innerHTML='<button class="modal-btn modal-btn-cancel" onclick="closeModal()">\u53d6\u6d88</button><button class="modal-btn modal-btn-confirm" onclick="doCreateFolder()">\u521b\u5efa</button>';
  document.getElementById("modalOverlay").classList.add("active");
  setTimeout(function(){input.focus()},100);
}

function doCreateFolder(){var n=document.getElementById("modalInput").value.trim();if(!n)return;collections.push({id:nextId++,name:n,bookmarks:[]});closeModal();renderAll();}

function quickAdd(){
  if(!isAdmin)return;
  var input=document.getElementById("quickAddInput");
  var raw=input.value.trim();
  if(!raw)return;
  raw=raw.replace(/^https?:\/\//,"").split("/")[0];
  if(!raw)return;
  if(!collections.length)collections.push({id:nextId++,name:"\u672a\u5206\u7ec4",bookmarks:[]});
  var clean=raw.replace(/^www\./,"");
  collections[0].bookmarks.push({title:clean,url:raw,domain:raw,desc:""});
  recentBookmarks.unshift({title:clean,domain:raw});
  input.value="";
  renderAll();
}

function addBookmark(){
  if(!isAdmin)return;
  var ui=document.getElementById("bookmarkUrlInput"),di=document.getElementById("bookmarkDescInput");
  var raw=ui.value.trim();
  if(!raw)return;
  raw=raw.replace(/^https?:\/\//,"").split("/")[0];
  if(!raw)return;
  var desc=di?di.value.trim():"";
  var fid=window._previewFid;
  if(!fid)return;
  var c=collections.find(function(x){return x.id===fid});
  if(!c)return;
  var clean=raw.replace(/^www\./,"");
  c.bookmarks.push({title:clean,url:raw,domain:raw,desc:desc});
  recentBookmarks.unshift({title:clean,domain:raw});
  ui.value="";if(di)di.value="";
  openPreview(fid);renderRecent();updateStats();
}

async function pushToRepo(content){
  var resp=await fetch("https://api.github.com/repos/timaio0911/noir-bookmarks/contents/data.json",{headers:{"Authorization":"token "+ghToken,"Accept":"application/vnd.github.v3+json"}});
  var sha=resp.ok?(await resp.json()).sha:null;
  var putResp=await fetch("https://api.github.com/repos/timaio0911/noir-bookmarks/contents/data.json",{method:"PUT",headers:{"Authorization":"token "+ghToken,"Content-Type":"application/json"},body:JSON.stringify({message:"update bookmarks",content:btoa(unescape(encodeURIComponent(content))),sha:sha})});
  if(!putResp.ok)throw new Error("Push failed: "+putResp.status);
}

async function syncNow(){
  if(!ghToken){setupToken();return;}
  showToast("\u6b63\u5728\u63a8\u9001...");
  try{
    var data=JSON.stringify({collections:collections,recent:recentBookmarks,nextId:nextId,updatedAt:new Date().toISOString()},null,2);
    await pushToRepo(data);
    document.getElementById("syncTime").textContent="\u6700\u540e\u63a8\u9001\uff1a"+new Date().toLocaleString("zh-CN");
    showToast("\u63a8\u9001\u5b8c\u6210 \u2714");
  }catch(e){showToast("\u63a8\u9001\u5931\u8d25: "+e.message,true);}
}

async function loadFromRepo(){
  try{var resp=await fetch("data.json?t="+Date.now());if(!resp.ok)return;var d=await resp.json();if(d&&d.collections){collections=d.collections||[];recentBookmarks=d.recent||[];nextId=d.nextId||1;renderAll();initSpotlight();}}catch(e){}
}

function openSearch(){document.getElementById("searchOverlay").classList.add("active");setTimeout(function(){document.getElementById("searchInput").focus()},100);}
function closeSearch(){document.getElementById("searchOverlay").classList.remove("active");document.getElementById("searchInput").value="";document.getElementById("searchResults").innerHTML='<div class="search-hint">\u8f93\u5165\u5173\u952e\u8bcd\u641c\u7d22</div>';}
function doSearch(){var q=document.getElementById("searchInput").value.trim().toLowerCase(),el=document.getElementById("searchResults");if(!q){el.innerHTML='<div class="search-hint">\u8f93\u5165\u5173\u952e\u8bcd\u641c\u7d22</div>';return;}var results=[];collections.forEach(function(col){col.bookmarks.forEach(function(b){if((b.title+" "+b.url+" "+(b.desc||"")).toLowerCase().indexOf(q)!==-1)results.push({bm:b,folder:col.name,fid:col.id})})});if(!results.length){el.innerHTML='<div class="search-empty">\u672a\u627e\u5230</div>';return;}el.innerHTML=results.map(function(r){return '<div class="search-result" onclick="closeSearch();openPreview('+r.fid+')"><div class="search-result-folder">'+esc(r.folder)+'</div><div class="search-result-title">'+esc(r.bm.title)+'</div><div class="search-result-url">'+esc(r.bm.url)+'</div>'+(r.bm.desc?'<div class="search-result-desc">'+esc(r.bm.desc)+'</div>':'')+'</div>';}).join("");lucide.createIcons();}

function showToast(msg,isErr){var ex=document.querySelector(".toast");if(ex)ex.remove();var t=document.createElement("div");t.className="toast";t.textContent=msg;if(isErr){t.style.background="#1a0000";t.style.color="#ef4444";t.style.border="1px solid #ef4444"}else{t.style.background="#0a1a0a";t.style.color="#4ade80";t.style.border="1px solid #4ade80"}document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity="1";t.style.transform="translateY(0)"});setTimeout(function(){t.style.opacity="0";t.style.transform="translateY(-10px)";setTimeout(function(){t.remove()},400)},3000);}
</script>
